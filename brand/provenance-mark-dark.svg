<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Provenance">
  <defs>
    <clipPath id="topcross"><rect x="96" y="50" width="64" height="78"/></clipPath>
  </defs>
  <!-- base light link -->
  <rect x="50" y="74" width="96" height="104" rx="34" fill="none" stroke="#fafafa" stroke-width="18"/>
  <!-- accent link over (covers light link at both crossings) -->
  <rect x="110" y="74" width="96" height="104" rx="34" fill="none" stroke="#F97316" stroke-width="18"/>
  <!-- re-draw light link at the top crossing so the links weave -->
  <g clip-path="url(#topcross)">
    <rect x="50" y="74" width="96" height="104" rx="34" fill="none" stroke="#fafafa" stroke-width="18"/>
  </g>
</svg>
