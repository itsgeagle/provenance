name: provenance-dev

# Local development services only.
# The server itself is a Node process — run it with:
#   npm run dev --workspace=packages/server
#
# NOT used in automated tests; testcontainers spawn ephemeral instances.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: provenance
      POSTGRES_PASSWORD: provenance
      POSTGRES_DB: provenance
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U provenance']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
